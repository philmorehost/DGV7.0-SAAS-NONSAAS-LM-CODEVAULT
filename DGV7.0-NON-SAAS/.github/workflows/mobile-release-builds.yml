name: Mobile Apps Production Build (Android & iOS)

on:
  push:
    branches: [ "main", "master", "DG6.7", "DGV7-NEW-1.2" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  # ─── ANDROID BUILD MATRIX ──────────────────────────────────────────
  android-builds:
    name: Build Android (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ "DG6-Android", "MZEEVTU" ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for Gradle Wrapper
      run: |
        chmod +x ${{ matrix.project }}/gradlew || true
        # Restore a real Gradle wrapper if the local one is a simulation stub
        if [ ! -f "${{ matrix.project }}/gradlew" ] || grep -q "Simulation" "${{ matrix.project }}/gradlew"; then
          echo "Restoring production Gradle Wrapper..."
          gradle wrapper --gradle-version 8.0 --project-dir ${{ matrix.project }}
          chmod +x ${{ matrix.project }}/gradlew
        fi

    # ── DG6-Android (PayHub) Release Signing ──────────────────────────
    - name: Set up Release Signing for DG6-Android (PayHub)
      if: matrix.project == 'DG6-Android'
      run: |
        cd DG6-Android
        echo "Decoding release keystore from base64..."
        base64 -d release.keystore.b64 > app/release.keystore
        echo "Writing key.properties..."
        echo "storeFile=app/release.keystore" > key.properties
        echo "storePassword=OMOTERE@234.com" >> key.properties
        echo "keyAlias=philmore-datagifting" >> key.properties
        echo "keyPassword=OMOTERE@234.com" >> key.properties
        echo "Signing setup complete for DG6-Android (PayHub)"

    # ── MZEEVTU Release Signing ────────────────────────────────────────
    - name: Set up Release Signing for MZEEVTU
      if: matrix.project == 'MZEEVTU'
      run: |
        cd MZEEVTU
        echo "Decoding MZEEVTU release keystore from base64..."
        base64 -d keystore/mzeevtu-release.b64 > keystore/mzeevtu-release.jks
        echo "Keystore ready at keystore/mzeevtu-release.jks"

    # ── Build Steps ────────────────────────────────────────────────────
    - name: Build Production Release APK
      run: |
        cd ${{ matrix.project }}
        ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Build Production Release AAB (App Bundle)
      run: |
        cd ${{ matrix.project }}
        ./gradlew bundleRelease --no-daemon --stacktrace

    # ── Upload Artifacts ───────────────────────────────────────────────
    - name: Upload Production APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-Production-APK
        path: ${{ matrix.project }}/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: warn

    - name: Upload Production AAB Bundle
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-Production-AAB
        path: ${{ matrix.project }}/app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: warn

  # ─── IOS BUILD MATRIX ──────────────────────────────────────────────
  ios-builds:
    name: Build iOS (${{ matrix.project }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ "DG6-iOS", "MZEEVTU-iOS" ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Clean and Archive iOS App (Unsigned)
      run: |
        cd ${{ matrix.project }}
        if ls *.xcodeproj > /dev/null 2>&1 || ls */*.xcodeproj > /dev/null 2>&1; then
          echo "Xcode project found. Building archive..."
          xcodebuild clean archive \
            -scheme "${{ matrix.project }}" \
            -archivePath build/${{ matrix.project }}.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO
        else
          echo "No Xcode project found in ${{ matrix.project }}. Packaging Swift source files."
          mkdir -p build/${{ matrix.project }}.xcarchive
          find . -name "*.swift" -o -name "*.plist" | head -50 > build/${{ matrix.project }}.xcarchive/source_manifest.txt
          echo "iOS source archive — awaiting Xcode project setup" > build/${{ matrix.project }}.xcarchive/release.txt
          echo "Branch: $GITHUB_REF_NAME | Commit: $GITHUB_SHA | Date: $(date)" >> build/${{ matrix.project }}.xcarchive/release.txt
        fi

    - name: Compress Archive Package
      run: |
        cd ${{ matrix.project }}
        zip -r ${{ matrix.project }}-Archive.zip build/${{ matrix.project }}.xcarchive

    - name: Upload iOS Archive
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-iOS-Archive
        path: ${{ matrix.project }}/${{ matrix.project }}-Archive.zip
        if-no-files-found: warn
