name: PayHubGuest

options:
  bundleIdPrefix: com.payhub
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    # No local Xcode/macOS in this environment to verify a real signing identity — CI archives
    # unsigned (CODE_SIGNING_ALLOWED=NO, see .github/workflows/build-apps.yml), which needs no
    # provisioning profile at all.

targets:
  PayHubGuest:
    type: application
    platform: iOS
    sources:
      - path: PayHubGuest
    info:
      path: Generated-Info.plist
      properties:
        CFBundleDisplayName: PayHub Guest
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # Overridable per build without touching AppConfig.swift's fallback constant — see
        # AppConfig.swift, which already reads this key if present.
        API_BASE_URL: https://payhub.com.ng/
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.payhub.guest
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

# CI's xcodebuild step derives the scheme name from the folder name ("PayHub-Guest-iOS", via
# `basename "${{ matrix.project }}"` in .github/workflows/build-apps.yml) — NOT from the
# PayHubGuest target/module name above. Without this explicit scheme, XcodeGen would only
# auto-generate one named "PayHubGuest", and `xcodebuild -scheme "PayHub-Guest-iOS"` would fail
# to find it.
schemes:
  PayHub-Guest-iOS:
    build:
      targets:
        PayHubGuest: all
    archive:
      config: Release
